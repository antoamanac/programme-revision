name: Build Desktop App

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows (.exe)
            command: npm run dist
            artifact: "*.exe"
          - os: macos-latest
            name: macOS (.dmg)
            command: npm run dist:mac
            artifact: "*.dmg"
          - os: ubuntu-latest
            name: Linux (.AppImage)
            command: npm run dist:linux
            artifact: "*.AppImage"

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
          PUPPETEER_SKIP_DOWNLOAD: "true"

      - name: Build web app
        run: npm run build
        env:
          NODE_ENV: production
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build desktop package
        working-directory: electron
        run: ${{ matrix.command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_LINK: ""

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: electron/release/${{ matrix.artifact }}
          if-no-files-found: warn
          retention-days: 30
